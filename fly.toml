# fly.toml app configuration file generated for porschelens on 2026-04-11T21:57:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'porschelens'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 4096
